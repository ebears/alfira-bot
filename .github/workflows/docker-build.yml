name: Build Docker images
on:
  push:
    branches: main
    paths-ignore:
      - "docs/**"
      - "README.md"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "README.md"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build API + bot image (validate only)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.api
          push: false

      - name: Build web image (validate only)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.web
          push: false

      - name: Build migrate image (validate only)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.migrate
          push: false

  publish:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push API + bot image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.api
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/alfira-bot-api:latest
            ghcr.io/${{ github.repository_owner }}/alfira-bot-api:${{ github.sha }}

      - name: Build and push web image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.web
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/alfira-bot-web:latest
            ghcr.io/${{ github.repository_owner }}/alfira-bot-web:${{ github.sha }}

      - name: Build and push migrate image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.migrate
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/alfira-bot-migrate:latest
            ghcr.io/${{ github.repository_owner }}/alfira-bot-migrate:${{ github.sha }}
