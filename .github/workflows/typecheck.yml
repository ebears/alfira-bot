name: Typecheck

on:
  push:
    branches: main
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "25"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: DATABASE_URL="postgresql://dummy:dummy@localhost:5432/dummy" npm run db:generate

      - name: Build bot package
        run: npm run -w packages/bot build

      - name: Typecheck API
        run: npx tsc --noEmit -p packages/api/tsconfig.json

      - name: Typecheck bot
        run: npx tsc --noEmit -p packages/bot/tsconfig.json

      - name: Typecheck web
        run: npx tsc --noEmit -p packages/web/tsconfig.json
