name: Typecheck

on:
  push:
    branches: main
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @alfira-bot/shared run build

      - name: Build bot package
        run: pnpm --filter @alfira-bot/bot run build

      - name: Lint with Biome
        run: pnpm run lint

      - name: Typecheck API
        run: pnpm exec tsc --noEmit -p packages/api/tsconfig.json

      - name: Typecheck bot
        run: pnpm exec tsc --noEmit -p packages/bot/tsconfig.json

      - name: Typecheck web
        run: pnpm exec tsc --noEmit -p packages/web/tsconfig.json
