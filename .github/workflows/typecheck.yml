name: Typecheck

on:
  push:
    branches: main
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build shared package
        run: bun run --filter @alfira-bot/shared build

      - name: Build bot package
        run: bun run --filter @alfira-bot/bot build

      - name: Lint with Biome
        run: bun run lint

      - name: Typecheck API
        run: bunx tsc --noEmit -p packages/api/tsconfig.json

      - name: Typecheck bot
        run: bunx tsc --noEmit -p packages/bot/tsconfig.json

      - name: Typecheck web
        run: bunx tsc --noEmit -p packages/web/tsconfig.json
