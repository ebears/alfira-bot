name: Check yt-dlp updates

on:
  schedule:
    # Run weekly on Monday at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  check-ytdlp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get current yt-dlp version
        id: current
        run: |
          CURRENT_VERSION=$(grep -oP 'ARG YTDLP_VERSION=\K[0-9.]+' Dockerfile.api)
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

      - name: Get latest yt-dlp release
        id: latest
        run: |
          LATEST_VERSION=$(curl -s https://api.github.com/repos/yt-dlp/yt-dlp/releases/latest | jq -r '.tag_name')
          echo "version=$LATEST_VERSION" >> $GITHUB_OUTPUT

      - name: Check for update
        id: check
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          LATEST="${{ steps.latest.outputs.version }}"
          
          if [ "$CURRENT" != "$LATEST" ]; then
            echo "update_available=true" >> $GITHUB_OUTPUT
            echo "current_version=$CURRENT" >> $GITHUB_OUTPUT
            echo "latest_version=$LATEST" >> $GITHUB_OUTPUT
          else
            echo "update_available=false" >> $GITHUB_OUTPUT
            echo "yt-dlp is up to date ($CURRENT)"
          fi

      - name: Create issue for yt-dlp update
        if: steps.check.outputs.update_available == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const currentVersion = '${{ steps.check.outputs.current_version }}';
            const latestVersion = '${{ steps.check.outputs.latest_version }}';
            
            // Check if an issue already exists for this version
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'dependencies,yt-dlp'
            });
            
            const existingIssue = issues.data.find(issue => 
              issue.title.includes('yt-dlp') && 
              issue.title.includes(latestVersion)
            );
            
            if (!existingIssue) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Update yt-dlp from ${currentVersion} to ${latestVersion}`,
                body: `## Outdated dependency\n\nA new version of yt-dlp is available.\n\n- **Current version:** ${currentVersion}\n- **Latest version:** ${latestVersion}\n\n### Release notes\n\nSee https://github.com/yt-dlp/yt-dlp/releases/tag/${latestVersion}\n\n### How to update\n\nUpdate the \`YTDLP_VERSION\` argument in \`Dockerfile.api\`:\n\n\`\`\`dockerfile\nARG YTDLP_VERSION=${latestVersion}\n\`\`\`\n`,
                labels: ['dependencies', 'yt-dlp']
              });
              console.log(`Created issue for yt-dlp ${latestVersion}`);
            } else {
              console.log(`Issue already exists for yt-dlp ${latestVersion}`);
            }
