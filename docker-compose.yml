# ---------------------------------------------------------------------------
# Development docker-compose — full stack
#
# Runs PostgreSQL, the API + bot, and the web front-end all inside Docker.
# Source files are mounted as volumes so you can edit code without rebuilding:
#
# API + bot — edit packages/api/src, then `docker compose restart alfira`.
# Web — edit packages/web/src, rebuild the image to see changes.
#
# The bot package is pre-compiled during the alfira image build. If you change
# code inside packages/bot, rebuild the image first:
#   docker compose build alfira
#
# First-time setup:
#   cp .env.example .env
#   fill in all values
#
# Usage:
#   docker compose up --build          — build images and start all services
#   docker compose up -d               — start in the background (after first build)
#   docker compose down                — stop and remove containers
#   docker compose down -v             — stop and wipe all data (clean slate)
#   docker compose restart alfira       — reload the API after TypeScript changes
#   docker compose build alfira         — rebuild the alfira image (e.g. after bot changes)
# ---------------------------------------------------------------------------

services:
  nodelink:
    image: docker.io/performanc/nodelink:latest
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 2333
      NODELINK_AUTHORIZATION: ${NODELINK_AUTHORIZATION:-}
    ports:
      - "2333:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/ || exit 0"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: botuser
      POSTGRES_PASSWORD: botpass
      POSTGRES_DB: musicbot
    ports:
      # Exposes PostgreSQL on localhost:5432 for tools like Drizzle Studio or
      # any DB client running directly on the host.
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botuser -d musicbot"]
      interval: 10s
      timeout: 5s
      retries: 5

  alfira:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      nodelink:
        condition: service_healthy
    env_file:
      # Local .env file provides Discord tokens, OAuth secrets, JWT secret, etc.
      # Copy .env.example to .env and fill in real values before first run.
      - .env
    environment:
      # Override DATABASE_URL so it resolves to the 'db' service, not localhost.
      DATABASE_URL: postgresql://botuser:botpass@db:5432/musicbot
      NODELINK_URL: http://nodelink:3000
      NODELINK_AUTHORIZATION: ${NODELINK_AUTHORIZATION:-}
      NODE_ENV: development
    ports:
      - "3001:3001"
    volumes:
      # Live-mount API source files — restart the service to pick up changes.
      # The bot's compiled dist/ is baked into the image and stays intact here.
      - ./packages/api/src:/app/packages/api/src
      # Mount shared source so hot-reload picks up DB changes.
      - ./packages/shared/src:/app/packages/shared/src
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://localhost:3001/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  pgdata:
