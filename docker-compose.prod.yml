# ---------------------------------------------------------------------------
# Production docker-compose — full stack
#
# Setup:
#   1. Copy .env.example to .env and fill in your values
#   2. Run: docker compose -f docker-compose.prod.yml up -d
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml logs -f
#   docker compose -f docker-compose.prod.yml down
# ---------------------------------------------------------------------------
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Don't expose ports in production unless needed
    # expose:
    #   - 5432

  nodelink:
    image: docker.io/performanc/nodelink:latest
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 2333
      NODELINK_AUTHORIZATION: ${NODELINK_AUTHORIZATION:-}
    ports:
      - "2333:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/ || exit 0"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  alfira:
    image: ghcr.io/ebears/alfira:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      nodelink:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      NODELINK_URL: http://nodelink:3000
      NODELINK_AUTHORIZATION: ${NODELINK_AUTHORIZATION:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      DISCORD_REDIRECT_URI: ${DISCORD_REDIRECT_URI:-http://localhost:3001/auth/callback}
      GUILD_ID: ${GUILD_ID}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_ROLE_IDS: ${ADMIN_ROLE_IDS}
      WEB_UI_ORIGIN: ${WEB_UI_ORIGIN:-http://localhost:3001}
      TRUSTED_PROXY_IP: ${TRUSTED_PROXY_IP}
    ports:
      - "${DOCKER_HOST_IP:-0.0.0.0}:3001:3001"
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://localhost:3001/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  pgdata:
